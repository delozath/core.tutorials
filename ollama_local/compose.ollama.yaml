services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    gpus: all
    ports:
      - 127.0.0.1:11434:11434
    volumes:
      - ollama:/root/.ollama
    #network_mode: "host"
    environment:
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_NUM_PARALLEL: 1

volumes:
  ollama:
